<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <defs>
    <radialGradient id="bgA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="skinA" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f5c5a3"/>
      <stop offset="100%" stop-color="#d4956a"/>
    </radialGradient>
    <clipPath id="circleA">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bgA)"/>
  <g clip-path="url(#circleA)">
    <!-- Suit body -->
    <ellipse cx="100" cy="185" rx="62" ry="45" fill="#1a1a3e"/>
    <!-- Shirt & tie -->
    <ellipse cx="100" cy="178" rx="28" ry="30" fill="#f0f0f0"/>
    <polygon points="100,155 95,185 100,190 105,185" fill="#ff6a00"/>
    <!-- Jacket lapels -->
    <path d="M72,160 Q85,155 100,158 Q115,155 128,160 L135,200 L65,200 Z" fill="#1a1a3e"/>
    <path d="M100,158 L88,175 L72,160 Z" fill="#252550"/>
    <path d="M100,158 L112,175 L128,160 Z" fill="#252550"/>
    <!-- Neck -->
    <rect x="88" y="138" width="24" height="22" rx="8" fill="url(#skinA)"/>
    <!-- Head -->
    <ellipse cx="100" cy="115" rx="38" ry="42" fill="url(#skinA)"/>
    <!-- Hair -->
    <ellipse cx="100" cy="78" rx="38" ry="18" fill="#1a0a00"/>
    <path d="M62,100 Q58,80 65,70 Q75,60 100,58 Q125,60 135,70 Q142,80 138,100" fill="#1a0a00"/>
    <!-- Side hair -->
    <ellipse cx="64" cy="105" rx="8" ry="14" fill="#1a0a00"/>
    <ellipse cx="136" cy="105" rx="8" ry="14" fill="#1a0a00"/>
    <!-- Eyes -->
    <ellipse cx="85" cy="112" rx="7" ry="5" fill="white"/>
    <ellipse cx="115" cy="112" rx="7" ry="5" fill="white"/>
    <circle cx="86" cy="113" r="3.5" fill="#2a1a0a"/>
    <circle cx="116" cy="113" r="3.5" fill="#2a1a0a"/>
    <circle cx="87" cy="112" r="1.2" fill="white"/>
    <circle cx="117" cy="112" r="1.2" fill="white"/>
    <!-- Eyebrows -->
    <path d="M78,105 Q85,101 92,104" stroke="#1a0a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M108,104 Q115,101 122,105" stroke="#1a0a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M98,118 Q96,126 98,130 Q100,132 102,130 Q104,126 102,118" stroke="#c4855a" stroke-width="1.5" fill="none"/>
    <!-- Mouth -->
    <path d="M90,138 Q100,144 110,138" stroke="#b07050" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Ears -->
    <ellipse cx="62" cy="118" rx="6" ry="9" fill="url(#skinA)"/>
    <ellipse cx="138" cy="118" rx="6" ry="9" fill="url(#skinA)"/>
  </g>
  <!-- Amazon orange ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#ff9900" stroke-width="3"/>
</svg>
