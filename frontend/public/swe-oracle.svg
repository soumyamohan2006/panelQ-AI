<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgO" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e0a0a"/>
      <stop offset="100%" stop-color="#0d0505"/>
    </radialGradient>
    <radialGradient id="skinO" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8b896"/>
      <stop offset="100%" stop-color="#c8885e"/>
    </radialGradient>
    <clipPath id="circleO">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bgO)"/>
  <g clip-path="url(#circleO)">
    <!-- Suit -->
    <ellipse cx="100" cy="185" rx="62" ry="45" fill="#2a0a0a"/>
    <ellipse cx="100" cy="178" rx="28" ry="30" fill="#f5f5f5"/>
    <polygon points="100,155 95,185 100,190 105,185" fill="#cc0000"/>
    <path d="M72,160 Q85,155 100,158 Q115,155 128,160 L135,200 L65,200 Z" fill="#2a0a0a"/>
    <path d="M100,158 L88,175 L72,160 Z" fill="#3a1010"/>
    <path d="M100,158 L112,175 L128,160 Z" fill="#3a1010"/>
    <!-- Neck -->
    <rect x="88" y="138" width="24" height="22" rx="8" fill="url(#skinO)"/>
    <!-- Head -->
    <ellipse cx="100" cy="115" rx="38" ry="42" fill="url(#skinO)"/>
    <!-- Hair - salt & pepper short -->
    <path d="M62,100 Q58,78 68,68 Q80,58 100,56 Q120,58 132,68 Q142,78 138,100" fill="#555"/>
    <ellipse cx="100" cy="76" rx="36" ry="16" fill="#555"/>
    <ellipse cx="64" cy="104" rx="7" ry="13" fill="#555"/>
    <ellipse cx="136" cy="104" rx="7" ry="13" fill="#555"/>
    <!-- Eyes -->
    <ellipse cx="85" cy="112" rx="7" ry="5" fill="white"/>
    <ellipse cx="115" cy="112" rx="7" ry="5" fill="white"/>
    <circle cx="86" cy="113" r="3.5" fill="#1a3a5a"/>
    <circle cx="116" cy="113" r="3.5" fill="#1a3a5a"/>
    <circle cx="87" cy="112" r="1.2" fill="white"/>
    <circle cx="117" cy="112" r="1.2" fill="white"/>
    <!-- Glasses -->
    <rect x="76" y="106" width="22" height="14" rx="5" fill="none" stroke="#333" stroke-width="2.2"/>
    <rect x="102" y="106" width="22" height="14" rx="5" fill="none" stroke="#333" stroke-width="2.2"/>
    <line x1="98" y1="112" x2="102" y2="112" stroke="#333" stroke-width="2"/>
    <line x1="76" y1="112" x2="68" y2="110" stroke="#333" stroke-width="2"/>
    <line x1="124" y1="112" x2="132" y2="110" stroke="#333" stroke-width="2"/>
    <!-- Eyebrows -->
    <path d="M78,104 Q85,100 92,103" stroke="#444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M108,103 Q115,100 122,104" stroke="#444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M98,118 Q96,126 98,130 Q100,132 102,130 Q104,126 102,118" stroke="#b07858" stroke-width="1.5" fill="none"/>
    <!-- Mouth - slight smile -->
    <path d="M90,138 Q100,145 110,138" stroke="#a06848" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Ears -->
    <ellipse cx="62" cy="118" rx="6" ry="9" fill="url(#skinO)"/>
    <ellipse cx="138" cy="118" rx="6" ry="9" fill="url(#skinO)"/>
  </g>
  <!-- Oracle red ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#cc0000" stroke-width="3"/>
</svg>
